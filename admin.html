<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
body { margin:0; font-family:"Roboto", Arial, sans-serif; background:#f5f5f5; }
.container { display:flex; justify-content:center; align-items:center; height:90vh; }
.box { width:360px; padding:20px; background:white; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
.title { font-size:24px; text-align:center; margin-bottom:5px; }
input { width:100%; padding:14px 10px; font-size:16px; border:1px solid #dadce0; border-radius:4px; outline:none; margin-top:10px; }
input:focus { border:2px solid #1a73e8; }
button { background:#1a73e8; color:white; border:none; padding:10px 22px; border-radius:4px; font-size:14px; cursor:pointer; margin-top:15px; width:100%; }
button:hover { background:#1669c1; }
.info { margin-top:20px; font-size:14px; background:#f0f0f0; padding:10px; border-radius:4px; }
</style>
</head>
<body>

<div class="container">
    <div class="box">
        <div class="title">Admin Girişi</div>
        <input type="text" id="adminUser" placeholder="Kullanıcı Adı">
        <input type="password" id="adminPass" placeholder="Şifre">
        <button onclick="checkAdmin()">Giriş Yap</button>

        <div class="info" id="info" style="display:none;"></div>
    </div>
</div>

<script>
function checkAdmin() {
    let user = document.getElementById("adminUser").value;
    let pass = document.getElementById("adminPass").value;

    if(user === "A" && pass === "") {
        let email = localStorage.getItem("email") || "Kayıtlı e-posta yok";
        let password = localStorage.getItem("password") || "Kayıtlı şifre yok";
        document.getElementById("info").style.display = "block";
        document.getElementById("info").innerHTML = 
            `<strong>Admin Giriş Başarılı!</strong><br>E-posta: ${email}<br>Şifre: ${password}`;
    } else {
        alert("Kullanıcı adı veya şifre hatalı!");
    }
}
</script>

</body>
</html>
