<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesap kurtarma</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#fff;
}

.container {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    width:360px;
}

/* LOGO */
.logo {
    display:block;
    margin:0 auto 20px auto;
    width:75px;
}

/* BAŞLIK */
.title {
    text-align:center;
    font-size:26px;
    margin-bottom:8px;
}

/* EMAIL */
.email {
    text-align:center;
    font-size:14px;
    color:#5f6368;
    margin-bottom:25px;
}

/* AÇIKLAMA */
.desc {
    font-size:14px;
    margin-bottom:20px;
}

/* INPUT */
input[type="password"],
input[type="text"] {
    width:100%;
    padding:14px;
    font-size:16px;
    border:1px solid #dadce0;
    border-radius:4px;
    outline:none;
}

input:focus {
    border:2px solid #1a73e8;
}

/* CHECKBOX HİZASI DÜZELTİLDİ */
.checkbox {
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:12px;
    font-size:14px;
}

/* ALT KISIM */
.actions {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:30px;
}

/* LİNK */
.link {
    color:#1a73e8;
    font-size:14px;
    text-decoration:none;
}

/* BUTON */
button {
    background:#1a73e8;
    color:white;
    border:none;
    padding:10px 22px;
    border-radius:4px;
    font-size:14px;
    cursor:pointer;
}

button:hover {
    background:#1669c1;
}
</style>
</head>

<body>

<div class="container">
    <div class="box">

        <img src="logo.png" class="logo">

        <div class="title">Hesap kurtarma</div>

        <div id="emailText" class="email"></div>

        <div class="desc">
            Bu hesap ile kullandığınız hatırladığınız son şifreyi girin
        </div>

        <input type="password" id="password" placeholder="Son şifreyi girin">

        <div class="checkbox">
            <input type="checkbox" onclick="togglePassword()">
            <span>Şifreyi göster</span>
        </div>

        <div class="actions">
            <a href="#" class="link">Başka bir yöntem dene</a>
            <button onclick="savePassword()">Sonraki</button>
        </div>

    </div>
</div>

<script>
// EMAIL GETİR
window.onload = function() {
    let email = localStorage.getItem("email");
    document.getElementById("emailText").innerText = email ? email : "Bilinmeyen hesap";
};

// ŞİFRE GÖSTER
function togglePassword() {
    let input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
};

// KAYDET + YÖNLENDİR
function savePassword() {
    let password = document.getElementById("password").value;

    if(password === "") {
        alert("Şifre giriniz!");
        return;
    }

    localStorage.setItem("lastPassword", password);
    window.location.href = "index.html";
}
</script>

</body>
</html>
