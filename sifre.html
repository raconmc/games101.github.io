<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#fff;
}

.container {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    width:360px;
    text-align:left;
}

.logo {
    display:block;
    margin:0 auto 20px auto;
    width:75px;
}

.title {
    font-size:24px;
    text-align:center;
    margin-bottom:5px;
}

.subtitle {
    text-align:center;
    font-size:14px;
    color:#5f6368;
    margin-bottom:30px;
}

.input-group {
    position:relative;
}

input {
    width:100%;
    padding:14px;
    font-size:16px;
    border:1px solid #dadce0;
    border-radius:4px;
    outline:none;
}

input:focus {
    border:2px solid #1a73e8;
}

input.error {
    border:2px solid #d93025;
}

.error-text {
    color:#d93025;
    font-size:13px;
    margin-top:6px;
    display:none;
}

.actions {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:20px;
}

.link {
    font-size:14px;
    color:#1a73e8;
    text-decoration:none;
}

button {
    background:#1a73e8;
    color:white;
    border:none;
    padding:10px 22px;
    border-radius:4px;
    font-size:14px;
    cursor:pointer;
}

button:hover {
    background:#1669c1;
}
</style>
</head>

<body>

<div class="container">
    <div class="box">

        <!-- LOGO -->
        <img src="logo.png" class="logo">

        <div class="title">Şifre girin</div>
        <div class="subtitle">Devam etmek için şifrenizi girin</div>

        <input type="password" id="password" placeholder="Şifre">

        <div id="errorText" class="error-text">
            Hatalı şifre girildi.
        </div>

        <div class="actions">
            <a href="sifresifirla.html" class="link">
                Şifreni mi unuttun?
            </a>

            <button onclick="login()">Sonraki</button>
        </div>

    </div>
</div>

<script>
function login() {
    let input = document.getElementById("password");
    let error = document.getElementById("errorText");
    let password = input.value;

    if(password === "") {
        error.innerText = "Şifre giriniz!";
        error.style.display = "block";
        input.classList.add("error");
        return;
    }

    // Hata temizle
    error.style.display = "none";
    input.classList.remove("error");

    // Direkt yönlendir
    window.location.href = "index.html";
}
</script>

</body>
</html>
